<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynapsysAI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#030a12;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden;display:flex;}
.left-sidebar{width:260px;flex-shrink:0;background:rgba(5,15,28,0.92);border-right:0.5px solid rgba(80,200,255,0.1);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.ls-header{padding:16px 16px 12px;border-bottom:0.5px solid rgba(80,200,255,0.08);}
.ls-title{font-size:11px;color:rgba(80,180,220,0.4);letter-spacing:0.1em;margin-bottom:10px;}
.ls-input-wrap{display:flex;flex-direction:column;gap:6px;}
.ls-textarea{background:rgba(8,35,65,0.9);border:0.5px solid rgba(80,200,255,0.35);border-radius:8px;padding:8px 10px;font-size:12px;color:#c8eeff;font-family:inherit;outline:none;resize:none;height:60px;}
.ls-textarea:focus{border-color:rgba(80,200,255,0.8);}
.ls-textarea::placeholder{color:rgba(150,210,255,0.3);}
.ls-send{background:rgba(20,80,140,0.7);border:0.5px solid rgba(80,200,255,0.45);border-radius:7px;color:#80d8ff;font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;letter-spacing:0.03em;display:flex;align-items:center;justify-content:center;gap:5px;}
.ls-send:hover{background:rgba(30,110,190,0.85);}
.ls-section{padding:10px 14px 6px;font-size:10px;color:rgba(80,180,220,0.3);letter-spacing:0.09em;}
.ls-flow{flex:1;overflow-y:auto;padding:0 10px 10px;scrollbar-width:none;}
.ls-flow::-webkit-scrollbar{display:none;}
.flow-item{padding:8px 10px;margin-bottom:4px;border-radius:7px;border:0.5px solid transparent;cursor:pointer;transition:all 0.15s;}
.flow-item:hover{background:rgba(20,80,140,0.2);border-color:rgba(80,200,255,0.15);}
.flow-item.active{background:rgba(20,80,140,0.3);border-color:rgba(80,200,255,0.3);}
.fi-label{font-size:11px;color:rgba(150,210,255,0.7);margin-bottom:2px;display:flex;align-items:center;}
.fi-text{font-size:11px;color:rgba(100,160,200,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;flex-shrink:0;}
.center{flex:1;position:relative;overflow:hidden;}
#neural-canvas{position:absolute;inset:0;width:100%;height:100%;}
#nodes-layer{position:absolute;inset:0;pointer-events:none;}
.hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(80,160,200,0.2);letter-spacing:0.07em;pointer-events:none;}
.right-sidebar{width:220px;flex-shrink:0;background:rgba(5,15,28,0.92);border-left:0.5px solid rgba(80,200,255,0.1);display:flex;flex-direction:column;height:100vh;overflow:hidden;padding:14px 12px;gap:6px;}
.new-brain-btn{background:linear-gradient(135deg,rgba(80,140,220,0.22),rgba(30,200,160,0.18));border:0.5px solid rgba(80,200,255,0.45);border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.2s;margin-bottom:6px;position:relative;overflow:hidden;}
.new-brain-btn:hover{border-color:rgba(80,200,255,0.7);background:linear-gradient(135deg,rgba(80,140,220,0.32),rgba(30,200,160,0.26));}
.brain-icon-wrap{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:#0d1a2e;display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px 4px rgba(80,200,255,0.3);}
.brain-dot{width:10px;height:10px;border-radius:50%;background:#50c8ff;box-shadow:0 0 8px 3px rgba(80,200,255,0.7);animation:core-pulse 2.2s infinite;}
@keyframes core-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
.nb-label{font-size:12px;color:#80d8ff;font-weight:500;}
.nb-sub{font-size:10px;color:rgba(80,160,200,0.45);}
.rs-section{font-size:10px;color:rgba(80,180,220,0.3);letter-spacing:0.09em;padding:8px 2px 4px;}
.rs-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background 0.15s;border:0.5px solid transparent;}
.rs-item:hover{background:rgba(20,80,140,0.2);border-color:rgba(80,200,255,0.12);}
.rs-icon{font-size:13px;width:20px;text-align:center;flex-shrink:0;}
.rs-label{font-size:12px;color:rgba(130,195,230,0.65);}
.rs-divider{height:0.5px;background:rgba(80,200,255,0.07);margin:8px 0;}
.recent-item{padding:6px 8px;border-radius:6px;cursor:pointer;transition:background 0.15s;border:0.5px solid transparent;margin-bottom:3px;}
.recent-item:hover{background:rgba(20,80,140,0.2);border-color:rgba(80,200,255,0.1);}
.ri-name{font-size:11px;color:rgba(120,190,225,0.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ri-date{font-size:10px;color:rgba(80,140,180,0.35);margin-top:1px;}
.node-bubble{position:absolute;transform:translate(-50%,-50%);pointer-events:all;transition:opacity 2s ease;}
.node-glow{border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;}
.node-core{border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:core-pulse 2.5s infinite;}
.node-text{position:absolute;width:190px;font-size:12px;line-height:1.5;color:#c8eeff;text-align:left;transform:translateX(-50%);left:50%;padding:10px 12px;background:rgba(5,22,42,0.88);border:0.5px solid rgba(80,200,255,0.22);border-radius:10px;pointer-events:all;transition:opacity 2s ease;}
.node-text.above{bottom:calc(100% + 12px);}
.node-text.below{top:calc(100% + 12px);}
.node-actions{display:flex;gap:6px;margin-top:8px;padding-top:7px;border-top:0.5px solid rgba(80,200,255,0.12);}
.na-btn{background:none;border:0.5px solid rgba(80,200,255,0.2);border-radius:5px;color:rgba(100,180,220,0.6);font-size:10px;padding:3px 7px;cursor:pointer;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;gap:3px;}
.na-btn:hover{background:rgba(20,80,140,0.3);color:#80d8ff;border-color:rgba(80,200,255,0.4);}
.na-btn.active-pos{color:#30f0c0;border-color:#30f0c0;}
.na-btn.active-neg{color:#f05050;border-color:#f05050;}
.na-btn.copied{color:#30f0c0;border-color:#30f0c0;}
.node-q-text{position:absolute;width:180px;font-size:11px;color:rgba(100,170,210,0.65);font-style:italic;text-align:center;transform:translateX(-50%);left:50%;pointer-events:none;transition:opacity 2s ease;}
.node-q-text.above{bottom:calc(100% + 10px);}
.node-q-text.below{top:calc(100% + 10px);}
.node-input-wrap{position:absolute;width:200px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:6px;align-items:center;}
.node-input-wrap.above{bottom:calc(100% + 12px);}
.node-input-wrap.below{top:calc(100% + 12px);}
.node-input{width:100%;background:rgba(8,35,65,0.9);border:0.5px solid rgba(80,200,255,0.4);border-radius:10px;padding:8px 10px;font-size:12px;color:#c8eeff;font-family:inherit;outline:none;resize:none;height:54px;}
.node-input:focus{border-color:rgba(80,200,255,0.85);}
.node-input::placeholder{color:rgba(150,210,255,0.3);}
.node-send{background:rgba(20,80,140,0.75);border:0.5px solid rgba(80,200,255,0.5);border-radius:8px;color:#80d8ff;font-size:11px;padding:5px 14px;cursor:pointer;font-family:inherit;letter-spacing:0.03em;}
.node-send:hover{background:rgba(30,110,190,0.85);}
.node-send:disabled{opacity:0.3;cursor:default;}
.synapse-flash{position:absolute;border-radius:50%;pointer-events:none;animation:flash-out 0.65s forwards;transform:translate(-50%,-50%);}
@keyframes flash-out{0%{opacity:1;transform:translate(-50%,-50%) scale(0.2);}50%{opacity:0.9;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.9);}}
.thinking-ring{position:absolute;border-radius:50%;pointer-events:none;border:1.5px solid rgba(80,200,255,0.55);transform:translate(-50%,-50%);animation:ring-expand 1.1s infinite;}
@keyframes ring-expand{0%{opacity:0.9;transform:translate(-50%,-50%) scale(0.4);}100%{opacity:0;transform:translate(-50%,-50%) scale(2.6);}}
</style>
</head>
<body>

<div class="left-sidebar">
  <div class="ls-header">
    <div class="ls-title">FLUXO DE CONVERSA</div>
    <div class="ls-input-wrap">
      <textarea class="ls-textarea" id="ls-input" placeholder="digite sua pergunta aqui..."></textarea>
      <button class="ls-send" id="ls-send-btn">disparar sinapse ↗</button>
    </div>
  </div>
  <div class="ls-section">HISTÓRICO</div>
  <div class="ls-flow" id="ls-flow"></div>
</div>

<div class="center" id="center">
  <canvas id="neural-canvas"></canvas>
  <div id="nodes-layer"></div>
  <div class="hint">sinapses crescem sempre para frente</div>
</div>

<div class="right-sidebar">
  <button class="new-brain-btn" onclick="newBrain()">
    <div class="brain-icon-wrap"><div class="brain-dot"></div></div>
    <div><div class="nb-label">Novo Cérebro</div><div class="nb-sub">iniciar nova sessão</div></div>
  </button>
  <div class="rs-section">NAVEGAÇÃO</div>
  <div class="rs-item"><span class="rs-icon">💬</span><span class="rs-label">Conversas</span></div>
  <div class="rs-item"><span class="rs-icon">📁</span><span class="rs-label">Projetos</span></div>
  <div class="rs-item"><span class="rs-icon">🔍</span><span class="rs-label">Procurar</span></div>
  <div class="rs-divider"></div>
  <div class="rs-section">CÉREBROS RECENTES</div>
  <div id="recent-list">
    <div class="recent-item"><div class="ri-name">Perfil D/I em liderança</div><div class="ri-date">hoje, 09:14</div></div>
    <div class="recent-item"><div class="ri-name">Comunicação com perfis C</div><div class="ri-date">ontem</div></div>
    <div class="recent-item"><div class="ri-name">Gestão de equipe diversa</div><div class="ri-date">12 abr</div></div>
    <div class="recent-item"><div class="ri-name">Análise de candidatos</div><div class="ri-date">10 abr</div></div>
  </div>
</div>

<script>
const center=document.getElementById('center');
const canvas=document.getElementById('neural-canvas');
const layer=document.getElementById('nodes-layer');
const ctx=canvas.getContext('2d');
const lsFlow=document.getElementById('ls-flow');

let W,H;
function resize(){W=center.clientWidth;H=center.clientHeight;canvas.width=W;canvas.height=H;}
resize();window.addEventListener('resize',resize);

const allNodes=[],connections=[],particles=[],ambients=[];
for(let i=0;i<20;i++){
  ambients.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*2+0.8,
    vx:(Math.random()-0.5)*0.18,vy:(Math.random()-0.5)*0.18,
    phase:Math.random()*Math.PI*2,
    col:Math.random()>0.5?'26,111,187':'13,158,120',
  });
}

let frontierAngle = Math.random()*Math.PI*2;
let lastNodePos = null;

function directedPos(fromX, fromY){
  const minDist=190, spreadAngle=Math.PI/2.5;
  for(let a=0;a<100;a++){
    const angle = frontierAngle + (Math.random()-0.5)*spreadAngle*(1+a*0.04);
    const dist = 180 + Math.random()*120;
    const x = fromX + Math.cos(angle)*dist;
    const y = fromY + Math.sin(angle)*dist;
    const m=90;
    if(x<m||x>W-m||y<m||y>H-m) continue;
    let ok=true;
    for(const n of allNodes){
      const dx=n.x-x,dy=n.y-y;
      if(Math.sqrt(dx*dx+dy*dy)<minDist){ok=false;break;}
    }
    if(ok){
      const actualAngle=Math.atan2(y-fromY,x-fromX);
      frontierAngle=actualAngle+((Math.random()-0.5)*0.3);
      return {x,y};
    }
  }
  frontierAngle+=Math.PI*0.4;
  const m=100;
  return{x:m+Math.random()*(W-m*2),y:m+Math.random()*(H-m*2.5)};
}

function textSide(y,size){return(y+size+90)>H?'above':'below';}

const RESPONSES=[
  "Seu perfil <strong>D/I</strong> combina velocidade de decisão com carisma. Em liderança, isso gera times que se movem rápido — o desafio é criar espaço para perfis S e C processarem antes de executar.",
  "Perfis <strong>C</strong> precisam de dados, não entusiasmo. Compartilhe contexto com antecedência, seja preciso nos números e dê tempo de análise. Isso constrói credibilidade duradoura.",
  "A <strong>sinapse D→S</strong> é a mais produtiva quando há respeito mútuo: D define a visão com urgência, S entrega com consistência. O conflito surge quando D pressiona sem escutar.",
  "Desenvolvimento DISC não é mudar quem você é — é <strong>expandir o repertório</strong>. Um D que aprende a pausar antes de decidir não perde força: ganha precisão.",
  "Equipes com <strong>diversidade de perfis</strong> são significativamente mais resilientes. Seu papel como D é criar clareza de direção — deixe o S sustentar o ritmo e o C garantir a qualidade.",
  "Em negociação, perfis D/I têm vantagem natural na abertura. O risco é fechar antes de ouvir — <strong>a pergunta certa vale mais que o argumento certo</strong>.",
];
let rIdx=0,activeInputNode=null,sessionItems=[];

const OVERLAP_DIST = 200;
function checkOverlaps(){
  for(let i=0;i<allNodes.length-1;i++){
    const n=allNodes[i];
    if(n.fading) continue;
    for(let j=i+1;j<allNodes.length;j++){
      const m=allNodes[j];
      const dx=n.x-m.x,dy=n.y-m.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<OVERLAP_DIST){
        fadeNode(n);
        break;
      }
    }
  }
}

function fadeNode(nd){
  if(nd.fading) return;
  nd.fading=true;
  if(!nd.el) return;
  nd.el.style.transition='opacity 0.1s ease';
  nd.el.style.opacity='0.4';
  setTimeout(()=>{
    nd.el.style.transition='opacity 3s ease';
    nd.el.style.opacity='0';
    setTimeout(()=>{
      nd.el.remove();
    },3200);
  },120);
}

function flash(x,y,color){
  const f=document.createElement('div');
  f.className='synapse-flash';
  f.style.cssText=`left:${x}px;top:${y}px;width:52px;height:52px;background:radial-gradient(circle,${color} 0%,transparent 70%);`;
  center.appendChild(f);
  setTimeout(()=>f.remove(),800);
}

function rings(x,y){
  const rs=[];
  for(let i=0;i<3;i++){
    const r=document.createElement('div');
    r.className='thinking-ring';
    r.style.cssText=`left:${x}px;top:${y}px;width:44px;height:44px;animation-delay:${i*0.38}s;`;
    center.appendChild(r);
    rs.push(r);
  }
  return rs;
}

function shoot(x1,y1,x2,y2,col,onDone){
  const n=14;
  for(let i=0;i<n;i++){
    const delay=i*(1100/n);
    const jx=(Math.random()-0.5)*50,jy=(Math.random()-0.5)*50;
    particles.push({x:x1,y:y1,tx:x2,ty:y2,mx:(x1+x2)/2+jx,my:(y1+y2)/2+jy,col,t:0,delay,size:Math.random()*3+1.5,done:false});
  }
  setTimeout(onDone,1300);
}

function copyText(text,btn){
  const plain=text.replace(/<[^>]+>/g,'');
  navigator.clipboard?.writeText(plain).catch(()=>{});
  btn.textContent='✓ copiado';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='copiar';btn.classList.remove('copied');},1500);
}

function makeActions(respTextEl,getRespText,onRetry){
  const wrap=document.createElement('div');
  wrap.className='node-actions';
  const cp=document.createElement('button');cp.className='na-btn';cp.textContent='copiar';
  cp.addEventListener('click',()=>copyText(getRespText(),cp));
  const rt=document.createElement('button');rt.className='na-btn';rt.textContent='↺ refazer';
  rt.addEventListener('click',()=>onRetry(rt));
  const pos=document.createElement('button');pos.className='na-btn';pos.textContent='👍';
  pos.addEventListener('click',()=>{pos.classList.toggle('active-pos');neg.classList.remove('active-neg');});
  const neg=document.createElement('button');neg.className='na-btn';neg.textContent='👎';
  neg.addEventListener('click',()=>{neg.classList.toggle('active-neg');pos.classList.remove('active-pos');});
  wrap.appendChild(cp);wrap.appendChild(rt);wrap.appendChild(pos);wrap.appendChild(neg);
  return wrap;
}

function makeNode({x,y,type,text,isInput,questionText}){
  const size=isInput?24:19;
  const col=type==='q'
    ?{glow:'rgba(26,111,187,0.2)',core:'#1a6fbb',ring:'#50c8ff'}
    :{glow:'rgba(13,158,120,0.18)',core:'#0d9e78',ring:'#30f0c0'};

  const el=document.createElement('div');
  el.className='node-bubble';
  el.style.left=x+'px';el.style.top=y+'px';
  el.style.opacity='0';el.style.transition='opacity 0.5s';

  const glow=document.createElement('div');
  glow.className='node-glow';
  glow.style.cssText=`width:${size*2}px;height:${size*2}px;background:${col.glow};box-shadow:0 0 ${isInput?34:20}px ${isInput?14:7}px ${col.ring};`;
  const core=document.createElement('div');
  core.className='node-core';
  core.style.cssText=`width:${size*0.65}px;height:${size*0.65}px;background:${col.core};box-shadow:0 0 14px 5px ${col.ring};`;
  glow.appendChild(core);el.appendChild(glow);

  const side=textSide(y,size);
  const nd={x,y,type,el,fading:false};

  if(isInput){
    const wrap=document.createElement('div');
    wrap.className=`node-input-wrap ${side}`;
    const inp=document.createElement('textarea');
    inp.className='node-input';inp.placeholder='próxima pergunta...';
    const btn=document.createElement('button');
    btn.className='node-send';btn.textContent='disparar sinapse ↗';
    wrap.appendChild(inp);wrap.appendChild(btn);
    el.appendChild(wrap);
    nd.inp=inp;nd.btn=btn;
    allNodes.push(nd);
    layer.appendChild(el);
    setTimeout(()=>{el.style.opacity='1';inp.focus();},50);
    btn.addEventListener('click',()=>{const q=inp.value.trim();if(q)handleSend(nd,q);});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();btn.click();}});
  } else if(questionText){
    const qt=document.createElement('div');
    qt.className=`node-q-text ${side}`;
    qt.textContent=questionText;
    el.appendChild(qt);
    allNodes.push(nd);
    layer.appendChild(el);
    setTimeout(()=>el.style.opacity='1',50);
  } else {
    const tx=document.createElement('div');
    tx.className=`node-text ${side}`;
    tx.innerHTML=text;
    const actions=makeActions(tx,()=>tx.innerHTML.replace(/<div class="node-actions">[\s\S]*/,'').replace(/<[^>]+>/g,''),()=>{
      const newResp=RESPONSES[(rIdx+1)%RESPONSES.length];rIdx++;
      tx.innerHTML=newResp;
      tx.appendChild(makeActions(tx,()=>tx.innerHTML.replace(/<div class="node-actions">[\s\S]*/,'').replace(/<[^>]+>/g,''),()=>{}));
      flash(x,y,'#30f0c0');
    });
    tx.appendChild(actions);
    el.appendChild(tx);
    allNodes.push(nd);
    layer.appendChild(el);
    setTimeout(()=>el.style.opacity='1',50);
  }

  setTimeout(()=>checkOverlaps(),600);
  return nd;
}

function addFlowItem(q,nodeRef){
  const item=document.createElement('div');
  item.className='flow-item';
  const cols=['#50c8ff','#30f0c0','#a78bfa'];
  const col=cols[sessionItems.length%3];
  item.innerHTML=`<div class="fi-label"><span class="fi-dot" style="background:${col}"></span>pergunta ${sessionItems.length+1}</div><div class="fi-text">${q}</div>`;
  item.addEventListener('click',()=>{
    if(nodeRef&&nodeRef.el){
      const glow=nodeRef.el.querySelector('.node-glow');
      if(glow){glow.style.transition='box-shadow 0.2s';glow.style.boxShadow='0 0 44px 20px #50c8ff';setTimeout(()=>{glow.style.boxShadow='';},800);}
    }
  });
  lsFlow.appendChild(item);
  lsFlow.scrollTop=lsFlow.scrollHeight;
  sessionItems.push(q);
  const recent=document.getElementById('recent-list');
  const ri=document.createElement('div');
  ri.className='recent-item';
  ri.innerHTML=`<div class="ri-name">${q.slice(0,32)}${q.length>32?'…':''}</div><div class="ri-date">agora</div>`;
  recent.insertBefore(ri,recent.firstChild);
}

function handleSend(fromNode,question){
  fromNode.btn.disabled=true;
  fromNode.inp.disabled=true;
  fromNode.el.style.transition='opacity 0.4s';
  fromNode.el.style.opacity='0.35';
  activeInputNode=null;

  const rs=rings(fromNode.x,fromNode.y);
  setTimeout(()=>{
    rs.forEach(r=>r.remove());
    flash(fromNode.x,fromNode.y,'#50c8ff');

    const qPos=directedPos(fromNode.x,fromNode.y);
    connections.push({x1:fromNode.x,y1:fromNode.y,x2:qPos.x,y2:qPos.y,col:'26,111,187',a:0});

    shoot(fromNode.x,fromNode.y,qPos.x,qPos.y,'#50c8ff',()=>{
      const qNode=makeNode({x:qPos.x,y:qPos.y,type:'q',text:'',isInput:false,questionText:question});
      flash(qPos.x,qPos.y,'#50c8ff');
      addFlowItem(question,qNode);

      const aPos=directedPos(qPos.x,qPos.y);
      setTimeout(()=>{
        connections.push({x1:qPos.x,y1:qPos.y,x2:aPos.x,y2:aPos.y,col:'13,158,120',a:0});
        flash(qPos.x,qPos.y,'#30f0c0');
        const resp=RESPONSES[rIdx%RESPONSES.length];rIdx++;

        shoot(qPos.x,qPos.y,aPos.x,aPos.y,'#30f0c0',()=>{
          makeNode({x:aPos.x,y:aPos.y,type:'a',text:resp,isInput:false});
          flash(aPos.x,aPos.y,'#30f0c0');

          setTimeout(()=>{
            const nPos=directedPos(aPos.x,aPos.y);
            connections.push({x1:aPos.x,y1:aPos.y,x2:nPos.x,y2:nPos.y,col:'26,111,187',a:0});
            shoot(aPos.x,aPos.y,nPos.x,nPos.y,'#50c8ff',()=>{
              const nextNode=makeNode({x:nPos.x,y:nPos.y,type:'q',text:'',isInput:true});
              flash(nPos.x,nPos.y,'#50c8ff');
              activeInputNode=nextNode;
            });
          },1000);
        });
      },850);
    });
  },1300);
}

function newBrain(){
  allNodes.length=0;connections.length=0;particles.length=0;
  sessionItems.length=0;rIdx=0;activeInputNode=null;
  layer.innerHTML='';lsFlow.innerHTML='';
  frontierAngle=Math.random()*Math.PI*2;
  const pos={x:W/2,y:H/2};
  const nd=makeNode({x:pos.x,y:pos.y,type:'q',text:'',isInput:true});
  activeInputNode=nd;
}

document.getElementById('ls-send-btn').addEventListener('click',()=>{
  const val=document.getElementById('ls-input').value.trim();
  if(!val) return;
  if(activeInputNode){
    activeInputNode.inp.value=val;
    document.getElementById('ls-input').value='';
    handleSend(activeInputNode,val);
  } else {
    const fromPos=lastNodePos||{x:W/2,y:H/2};
    const pos=directedPos(fromPos.x,fromPos.y);
    const nd=makeNode({x:pos.x,y:pos.y,type:'q',text:'',isInput:true});
    nd.inp.value=val;
    document.getElementById('ls-input').value='';
    setTimeout(()=>handleSend(nd,val),100);
  }
});
document.getElementById('ls-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('ls-send-btn').click();}
});

let frame=0;
function loop(){
  ctx.clearRect(0,0,W,H);frame++;
  ambients.forEach(n=>{
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0||n.x>W)n.vx*=-1;
    if(n.y<0||n.y>H)n.vy*=-1;
  });
  for(let i=0;i<ambients.length;i++){
    for(let j=i+1;j<ambients.length;j++){
      const a=ambients[i],b=ambients[j];
      const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){
        ctx.strokeStyle=`rgba(30,90,150,${(1-d/100)*0.1})`;
        ctx.lineWidth=0.4;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    }
  }
  ambients.forEach(n=>{
    const p=(Math.sin(frame*0.04+n.phase)+1)/2;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*(0.7+p*0.5),0,Math.PI*2);
    ctx.fillStyle=`rgba(${n.col},${0.15+p*0.2})`;ctx.fill();
  });
  connections.forEach(c=>{
    if(c.a<0.5)c.a+=0.011;
    ctx.strokeStyle=`rgba(${c.col},${c.a})`;
    ctx.lineWidth=0.9;ctx.setLineDash([7,5]);
    ctx.beginPath();ctx.moveTo(c.x1,c.y1);ctx.lineTo(c.x2,c.y2);ctx.stroke();
    ctx.setLineDash([]);
  });
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.done){particles.splice(i,1);continue;}
    p.delay-=16;if(p.delay>0)continue;
    p.t=Math.min(p.t+0.038,1);
    const t=p.t,mt=1-t;
    const x=mt*mt*p.x+2*mt*t*p.mx+t*t*p.tx;
    const y=mt*mt*p.y+2*mt*t*p.my+t*t*p.ty;
    const alpha=t<0.75?1:(1-t)/0.25;
    ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.col;ctx.globalAlpha=alpha*0.9;ctx.fill();ctx.globalAlpha=1;
    if(p.t>=1)p.done=true;
  }
  requestAnimationFrame(loop);
}

const initPos={x:W/2,y:H/2};
const initNode=makeNode({x:initPos.x,y:initPos.y,type:'q',text:'',isInput:true});
activeInputNode=initNode;
loop();
</script>
