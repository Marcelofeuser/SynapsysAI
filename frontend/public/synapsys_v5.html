<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynapsysAI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#030a12;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden;display:flex;}

/* ── LEFT SIDEBAR ── */
.left-sidebar{width:270px;flex-shrink:0;background:rgba(5,15,28,0.95);border-right:0.5px solid rgba(80,200,255,0.1);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.ls-header{padding:14px 14px 10px;border-bottom:0.5px solid rgba(80,200,255,0.08);}
.ls-logo{font-size:10px;color:rgba(80,180,220,0.35);letter-spacing:0.12em;margin-bottom:10px;}
.ls-input-wrap{display:flex;flex-direction:column;gap:6px;}
.ls-textarea{background:rgba(8,35,65,0.9);border:0.5px solid rgba(80,200,255,0.35);border-radius:8px;padding:8px 10px;font-size:12px;color:#c8eeff;font-family:inherit;outline:none;resize:none;height:58px;}
.ls-textarea:focus{border-color:rgba(80,200,255,0.8);}
.ls-textarea::placeholder{color:rgba(150,210,255,0.3);}
.ls-send{background:rgba(20,80,140,0.7);border:0.5px solid rgba(80,200,255,0.45);border-radius:7px;color:#80d8ff;font-size:11px;padding:5px 10px;cursor:pointer;font-family:inherit;letter-spacing:0.03em;}
.ls-send:hover{background:rgba(30,110,190,0.85);}

/* Feed — flex column normal, newest prepended, scrolls from top */
.ls-feed-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.ls-feed{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;
  padding:10px 10px 6px;gap:6px;
  scrollbar-width:thin;scrollbar-color:rgba(80,200,255,0.1) transparent;
}
.ls-feed::-webkit-scrollbar{width:3px;}
.ls-feed::-webkit-scrollbar-thumb{background:rgba(80,200,255,0.12);border-radius:2px;}

.feed-item{padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.55;border:0.5px solid transparent;flex-shrink:0;}
.feed-item.q{background:rgba(26,80,160,0.2);border-color:rgba(80,160,255,0.22);color:rgba(120,190,255,0.88);}
.feed-item.a{background:rgba(170,130,10,0.14);border-color:rgba(220,180,40,0.22);color:rgba(230,200,90,0.82);}
.feed-expand{font-size:10px;color:rgba(80,160,200,0.4);cursor:pointer;display:inline-block;margin-top:3px;}
.feed-expand:hover{color:rgba(80,200,255,0.7);}

/* ── CENTER ── */
.center{flex:1;position:relative;overflow:hidden;}
#neural-canvas{position:absolute;inset:0;width:100%;height:100%;}
#nodes-layer{position:absolute;inset:0;pointer-events:none;}
.hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(80,160,200,0.18);letter-spacing:0.07em;pointer-events:none;}

/* ── RIGHT SIDEBAR ── */
.right-sidebar{width:210px;flex-shrink:0;background:rgba(5,15,28,0.95);border-left:0.5px solid rgba(80,200,255,0.1);display:flex;flex-direction:column;height:100vh;overflow:hidden;padding:14px 12px 0;}
.new-brain-btn{background:linear-gradient(135deg,rgba(80,140,220,0.22),rgba(30,200,160,0.18));border:0.5px solid rgba(80,200,255,0.45);border-radius:10px;padding:11px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.2s;margin-bottom:8px;}
.new-brain-btn:hover{border-color:rgba(80,200,255,0.75);background:linear-gradient(135deg,rgba(80,140,220,0.32),rgba(30,200,160,0.26));}
.brain-icon-wrap{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:#0d1a2e;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px 3px rgba(80,200,255,0.3);}
.brain-dot{width:9px;height:9px;border-radius:50%;background:#50c8ff;box-shadow:0 0 7px 2px rgba(80,200,255,0.7);animation:core-pulse 2.2s infinite;}
@keyframes core-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
.nb-label{font-size:12px;color:#80d8ff;font-weight:500;}
.nb-sub{font-size:10px;color:rgba(80,160,200,0.4);}
.rs-section{font-size:10px;color:rgba(80,180,220,0.28);letter-spacing:0.09em;padding:6px 2px 3px;}
.rs-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background 0.15s;border:0.5px solid transparent;color:rgba(130,195,230,0.5);font-size:12px;}
.rs-item:hover{background:rgba(20,80,140,0.2);border-color:rgba(80,200,255,0.12);color:rgba(130,195,230,0.8);}
.rs-item-note{font-size:9px;color:rgba(80,130,160,0.32);margin-left:auto;}
.rs-divider{height:0.5px;background:rgba(80,200,255,0.07);margin:8px 0;}
.recent-item{padding:6px 8px;border-radius:6px;cursor:pointer;transition:background 0.15s;border:0.5px solid transparent;margin-bottom:2px;}
.recent-item:hover{background:rgba(20,80,140,0.18);border-color:rgba(80,200,255,0.1);}
.ri-name{font-size:11px;color:rgba(120,190,225,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ri-date{font-size:10px;color:rgba(80,140,180,0.3);margin-top:1px;}
.rs-spacer{flex:1;}
.rs-coming{font-size:9px;color:rgba(80,130,160,0.28);padding:2px 2px 10px;font-style:italic;}

/* Login button bottom */
.login-area{
  border-top:0.5px solid rgba(80,200,255,0.08);
  padding:10px 0;position:relative;
}
.login-btn{
  display:flex;align-items:center;gap:10px;
  padding:8px 8px;border-radius:8px;cursor:pointer;
  transition:background 0.15s;border:0.5px solid transparent;width:100%;
  background:none;
}
.login-btn:hover{background:rgba(20,80,140,0.2);border-color:rgba(80,200,255,0.12);}
.login-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:rgba(26,80,160,0.4);
  border:0.5px solid rgba(80,200,255,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#80d8ff;font-weight:500;
}
.login-info{flex:1;text-align:left;}
.login-name{font-size:12px;color:rgba(130,195,230,0.7);}
.login-email{font-size:10px;color:rgba(80,140,180,0.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.login-arrow{font-size:10px;color:rgba(80,160,200,0.3);}

/* Login menu popup */
.login-menu{
  position:absolute;bottom:calc(100% + 4px);left:0;right:0;
  background:rgba(8,22,40,0.98);
  border:0.5px solid rgba(80,200,255,0.18);
  border-radius:10px;
  padding:8px 0;
  display:none;
  z-index:100;
  box-shadow:0 -8px 32px rgba(0,0,0,0.4);
}
.login-menu.open{display:block;}
.lm-user{padding:10px 14px 8px;border-bottom:0.5px solid rgba(80,200,255,0.08);margin-bottom:4px;}
.lm-name{font-size:12px;color:rgba(130,195,230,0.8);font-weight:500;}
.lm-email{font-size:10px;color:rgba(80,140,180,0.45);margin-top:1px;}
.lm-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 14px;font-size:12px;
  color:rgba(120,185,225,0.6);cursor:pointer;
  transition:background 0.12s;
}
.lm-item:hover{background:rgba(20,80,140,0.2);color:rgba(130,195,230,0.9);}
.lm-icon{font-size:13px;width:18px;text-align:center;}
.lm-divider{height:0.5px;background:rgba(80,200,255,0.07);margin:4px 0;}
.lm-item.danger{color:rgba(220,90,90,0.6);}
.lm-item.danger:hover{background:rgba(200,50,50,0.1);color:rgba(240,120,120,0.9);}

/* ── NODE BUBBLES ── */
.node-bubble{position:absolute;transform:translate(-50%,-50%);pointer-events:all;}
.node-glow{border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;}
.node-core{border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:core-pulse 2.5s infinite;}
.node-text{position:absolute;width:178px;font-size:12px;line-height:1.5;color:#c8eeff;text-align:left;transform:translateX(-50%);left:50%;padding:9px 11px;background:rgba(5,22,42,0.92);border:0.5px solid rgba(80,200,255,0.2);border-radius:10px;pointer-events:all;}
.node-text.above{bottom:calc(100% + 12px);}
.node-text.below{top:calc(100% + 12px);}
.node-ellipsis{color:rgba(80,160,200,0.45);font-size:10px;display:block;margin-top:2px;}
.node-actions{display:flex;gap:5px;margin-top:7px;padding-top:6px;border-top:0.5px solid rgba(80,200,255,0.1);}
.na-btn{background:none;border:0.5px solid rgba(80,200,255,0.18);border-radius:5px;color:rgba(100,180,220,0.55);font-size:10px;padding:3px 6px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.na-btn:hover{background:rgba(20,80,140,0.3);color:#80d8ff;border-color:rgba(80,200,255,0.4);}
.na-btn.active-pos{color:#30f0c0;border-color:#30f0c0;}
.na-btn.active-neg{color:#f05050;border-color:#f05050;}
.na-btn.copied{color:#30f0c0;border-color:#30f0c0;}
.node-q-label{position:absolute;width:165px;font-size:11px;color:rgba(100,170,210,0.6);font-style:italic;text-align:center;transform:translateX(-50%);left:50%;pointer-events:none;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.node-q-label.above{bottom:calc(100% + 10px);}
.node-q-label.below{top:calc(100% + 10px);}
.node-input-wrap{position:absolute;width:192px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:6px;align-items:center;}
.node-input-wrap.above{bottom:calc(100% + 12px);}
.node-input-wrap.below{top:calc(100% + 12px);}
.node-input{width:100%;background:rgba(8,35,65,0.9);border:0.5px solid rgba(80,200,255,0.4);border-radius:10px;padding:8px 10px;font-size:12px;color:#c8eeff;font-family:inherit;outline:none;resize:none;height:52px;}
.node-input:focus{border-color:rgba(80,200,255,0.85);}
.node-input::placeholder{color:rgba(150,210,255,0.3);}
.node-send{background:rgba(20,80,140,0.75);border:0.5px solid rgba(80,200,255,0.5);border-radius:8px;color:#80d8ff;font-size:11px;padding:5px 14px;cursor:pointer;font-family:inherit;letter-spacing:0.03em;}
.node-send:hover{background:rgba(30,110,190,0.85);}
.node-send:disabled{opacity:0.3;cursor:default;}
.synapse-flash{position:absolute;border-radius:50%;pointer-events:none;animation:flash-out 0.5s forwards;transform:translate(-50%,-50%);}
@keyframes flash-out{0%{opacity:1;transform:translate(-50%,-50%) scale(0.2);}50%{opacity:0.85;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8);}}
.thinking-ring{position:absolute;border-radius:50%;pointer-events:none;border:1.5px solid rgba(80,200,255,0.55);transform:translate(-50%,-50%);animation:ring-expand 0.8s infinite;}
@keyframes ring-expand{0%{opacity:0.9;transform:translate(-50%,-50%) scale(0.4);}100%{opacity:0;transform:translate(-50%,-50%) scale(2.4);}}
</style>
</head>
<body>

<!-- LEFT -->
<div class="left-sidebar">
  <div class="ls-header">
    <div class="ls-logo">SYNAPSYS AI</div>
    <div class="ls-input-wrap">
      <textarea class="ls-textarea" id="ls-input" placeholder="faça sua pergunta..."></textarea>
      <button class="ls-send" id="ls-send-btn">disparar sinapse ↗</button>
    </div>
  </div>
  <div class="ls-feed-wrap">
    <div class="ls-feed" id="ls-feed"></div>
  </div>
</div>

<!-- CENTER -->
<div class="center" id="center">
  <canvas id="neural-canvas"></canvas>
  <div id="nodes-layer"></div>
  <div class="hint">sinapses crescem sempre para frente</div>
</div>

<!-- RIGHT -->
<div class="right-sidebar">
  <button class="new-brain-btn" onclick="newBrain()">
    <div class="brain-icon-wrap"><div class="brain-dot"></div></div>
    <div><div class="nb-label">Novo Cérebro</div><div class="nb-sub">nova sessão</div></div>
  </button>

  <div class="rs-section">NAVEGAÇÃO</div>
  <div class="rs-item" id="nav-conversations" data-panel="conversations"><span>💬</span>Conversas<span class="rs-item-note">30 dias</span></div>
  <div class="rs-item" id="nav-projects" data-panel="projects"><span>📁</span>Projetos<span class="rs-item-note">ativos</span></div>
  <div class="rs-item" id="nav-search" data-panel="search"><span>🔍</span>Procurar<span class="rs-item-note">global</span></div>

  <div class="rs-divider"></div>
  <div class="rs-section">CÉREBROS RECENTES</div>
  <div id="recent-list"></div>
  <div class="rs-coming" id="backend-status">conectando backend Synapsys...</div>

  <div class="rs-spacer"></div>

  <!-- Login area -->
  <div class="login-area">
    <div class="login-menu" id="login-menu">
      <div class="lm-user" id="login-menu-user">
        <div class="lm-name" id="login-menu-name">Acessar conta</div>
        <div class="lm-email" id="login-menu-email">entre para ativar persistencia</div>
      </div>
      <div class="lm-item" data-menu-action="settings"><span class="lm-icon">⚙️</span>Configuracoes</div>
      <div class="lm-item" data-menu-action="language"><span class="lm-icon">🌐</span>Idioma</div>
      <div class="lm-item" data-menu-action="help"><span class="lm-icon">❓</span>Receber ajuda</div>
      <div class="lm-divider"></div>
      <div class="lm-item" data-menu-action="plans"><span class="lm-icon">📋</span>Ver todos os planos</div>
      <div class="lm-item" data-menu-action="about"><span class="lm-icon">ℹ️</span>Saiba mais</div>
      <div class="lm-divider"></div>
      <div class="lm-item danger" data-menu-action="logout"><span class="lm-icon">↪</span>Sair</div>
    </div>
    <button class="login-btn" id="login-btn" onclick="toggleMenu()">
      <div class="login-avatar" id="login-avatar">AI</div>
      <div class="login-info">
        <div class="login-name" id="login-name">Acessar conta</div>
        <div class="login-email" id="login-email">entre para salvar seus cerebros</div>
      </div>
      <span class="login-arrow">⌃</span>
    </button>
  </div>
</div>

<script type="module" src="/synapsys_v5.js?v=2"></script>

</body>
</html>
